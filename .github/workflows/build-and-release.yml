name: Build and Release

on:
  push:
    branches: [ main, develop, github-release ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'

jobs:
  # Security and quality checks
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        working-directory: gui
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Tidy dependencies
        working-directory: gui
        env:
          GOWORK: off
        run: go mod tidy

      - name: Run gosec
        env:
          GOWORK: off
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd gui && gosec -severity high -confidence high ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        env:
          GOWORK: off
        with:
          version: latest
          working-directory: gui
          args: --verbose --print-issued-lines=true

  # Unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        working-directory: gui
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Tidy dependencies
        working-directory: gui
        env:
          GOWORK: off
        run: go mod tidy

      - name: Run tests
        working-directory: gui
        env:
          GOWORK: off
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Generate coverage
        working-directory: gui
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./gui/coverage.out

  # Build CLI for all platforms
  build-cli:
    name: Build CLI
    needs: [security, test]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build CLI
        env:
          GOWORK: off
        run: make cli

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ runner.os }}
          path: dist/proxmoxbackup-*

  # Build GUI (Windows only for now)
  build-gui:
    name: Build GUI
    needs: [security, test]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: gui/frontend
        run: npm install

      - name: Build GUI
        working-directory: gui
        env:
          GOWORK: off
        run: wails build -clean -platform windows/amd64

      - name: Copy binary to dist
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item gui/build/bin/NimbusBackup.exe dist/
        shell: pwsh

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: NimbusBackup-Windows
          path: dist/NimbusBackup.exe

  # Create release on tag
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release archives
        run: |
          mkdir -p release

          # CLI Windows
          cd artifacts/cli-Windows && zip ../../release/nimbus-backup-cli-${{ steps.version.outputs.VERSION }}-windows.zip *
          cd ../..

          # CLI Linux
          cd artifacts/cli-Linux && tar -czf ../../release/nimbus-backup-cli-${{ steps.version.outputs.VERSION }}-linux.tar.gz *
          cd ../..

          # CLI macOS
          cd artifacts/cli-macOS && tar -czf ../../release/nimbus-backup-cli-${{ steps.version.outputs.VERSION }}-macos.tar.gz *
          cd ../..

          # GUI Windows
          cd artifacts/NimbusBackup-Windows && zip ../../release/NimbusBackup-${{ steps.version.outputs.VERSION }}-windows.zip *
          cd ../..

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # Extract changelog for this version
          sed -n "/## \[${VERSION#v}\]/,/## \[/p" CHANGELOG.md | sed '$d' > RELEASE_NOTES.md

          # Add links at the end
          echo "" >> RELEASE_NOTES.md
          echo "---" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**RDEM Systems**: https://www.rdem-systems.com/" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**Nimbus Backup - Fully managed Proxmox Backup Servers Datastore**: https://nimbus.rdem-systems.com/" >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release badge
        if: ${{ !contains(steps.version.outputs.VERSION, '-') }}
        run: |
          echo "Latest stable release: ${{ steps.version.outputs.VERSION }}"
