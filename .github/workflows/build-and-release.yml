name: Build and Release

on:
  push:
    branches: [ main, develop, github-release ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'

jobs:
  # Security and quality checks
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        working-directory: gui
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Update all module dependencies
        env:
          GOWORK: off
        run: |
          # Update gui (critical for CI)
          cd gui
          go get -u golang.org/x/crypto golang.org/x/net golang.org/x/sys golang.org/x/text golang.org/x/exp
          go get -u github.com/wailsapp/wails/v2 github.com/google/uuid github.com/labstack/echo/v4
          go mod tidy

          # Update snapshot (very old golang.org/x/sys)
          cd ../snapshot
          go get -u github.com/go-ole/go-ole golang.org/x/sys
          go mod tidy

          # Update machinebackup (extremely old golang.org/x/sys from 2020)
          cd ../machinebackup
          go get -u github.com/go-ole/go-ole github.com/google/uuid golang.org/x/sys
          go mod tidy

          # Update service
          cd ../service
          go get -u github.com/kardianos/service golang.org/x/sys
          go mod tidy

          # Update pbscommon
          cd ../pbscommon
          go get -u github.com/klauspost/compress golang.org/x/net golang.org/x/text
          go mod tidy

          # Update directorybackup
          cd ../directorybackup
          go get -u github.com/cornelk/hashmap golang.org/x/exp golang.org/x/text golang.org/x/sys
          go mod tidy

          # Update nbd
          cd ../nbd
          go get -u github.com/pojntfx/go-nbd github.com/rivo/tview golang.org/x/sys golang.org/x/term golang.org/x/text
          go mod tidy

      - name: Run gosec
        env:
          GOWORK: off
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd gui && gosec -severity high -confidence high ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run golangci-lint
        working-directory: gui
        env:
          GOWORK: off
        run: golangci-lint run -v --timeout=5m

  # Unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        working-directory: gui
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Update all module dependencies
        env:
          GOWORK: off
        run: |
          # Update gui (critical for CI)
          cd gui
          go get -u golang.org/x/crypto golang.org/x/net golang.org/x/sys golang.org/x/text golang.org/x/exp
          go get -u github.com/wailsapp/wails/v2 github.com/google/uuid github.com/labstack/echo/v4
          go mod tidy

          # Update snapshot (very old golang.org/x/sys)
          cd ../snapshot
          go get -u github.com/go-ole/go-ole golang.org/x/sys
          go mod tidy

          # Update machinebackup (extremely old golang.org/x/sys from 2020)
          cd ../machinebackup
          go get -u github.com/go-ole/go-ole github.com/google/uuid golang.org/x/sys
          go mod tidy

          # Update service
          cd ../service
          go get -u github.com/kardianos/service golang.org/x/sys
          go mod tidy

          # Update pbscommon
          cd ../pbscommon
          go get -u github.com/klauspost/compress golang.org/x/net golang.org/x/text
          go mod tidy

          # Update directorybackup
          cd ../directorybackup
          go get -u github.com/cornelk/hashmap golang.org/x/exp golang.org/x/text golang.org/x/sys
          go mod tidy

          # Update nbd
          cd ../nbd
          go get -u github.com/pojntfx/go-nbd github.com/rivo/tview golang.org/x/sys golang.org/x/term golang.org/x/text
          go mod tidy

      - name: Run tests
        working-directory: gui
        env:
          GOWORK: off
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Generate coverage
        working-directory: gui
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./gui/coverage.out

  # Build CLI for all platforms
  build-cli:
    name: Build CLI
    needs: [security, test]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build CLI
        env:
          GOWORK: off
        run: make cli

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ runner.os }}
          path: dist/proxmoxbackup-*

  # Build GUI (Windows only for now)
  build-gui:
    name: Build GUI
    needs: [security, test]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Frontend Dependencies
        working-directory: gui/frontend
        run: npm install

      - name: Extract version from wails.json
        id: version
        working-directory: gui
        run: |
          $version = (Get-Content wails.json | ConvertFrom-Json).info.productVersion
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Building version: $version"
        shell: pwsh

      - name: Build GUI
        working-directory: gui
        env:
          GOWORK: off
        run: wails build -clean -platform windows/amd64 -ldflags "-X main.appVersion=${{ steps.version.outputs.VERSION }}"

      - name: Copy binary to dist
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item gui/build/bin/NimbusBackup.exe dist/
        shell: pwsh

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          $env:PATH += ";C:\Program Files (x86)\WiX Toolset v3.14\bin"
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Build MSI Installer
        working-directory: installer/wix
        run: |
          candle.exe Product.wxs -ext WixUIExtension -ext WixUtilExtension
          light.exe Product.wixobj -ext WixUIExtension -ext WixUtilExtension -out NimbusBackup.msi
          Copy-Item NimbusBackup.msi ../../dist/
        shell: pwsh

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NimbusBackup-Windows
          path: |
            dist/NimbusBackup.exe
            dist/NimbusBackup.msi

  # Create release on tag
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release archives
        run: |
          mkdir -p release

          # CLI Windows
          cd artifacts/cli-Windows && zip ../../release/nimbus-backup-cli-${{ steps.version.outputs.VERSION }}-windows.zip *
          cd ../..

          # CLI Linux
          cd artifacts/cli-Linux && tar -czf ../../release/nimbus-backup-cli-${{ steps.version.outputs.VERSION }}-linux.tar.gz *
          cd ../..

          # CLI macOS
          cd artifacts/cli-macOS && tar -czf ../../release/nimbus-backup-cli-${{ steps.version.outputs.VERSION }}-macos.tar.gz *
          cd ../..

          # GUI Windows - Add .exe, .msi (with and without version) and .zip
          cd artifacts/NimbusBackup-Windows
          cp NimbusBackup.exe ../../release/NimbusBackup-${{ steps.version.outputs.VERSION }}.exe
          cp NimbusBackup.exe ../../release/NimbusBackup.exe
          cp NimbusBackup.msi ../../release/NimbusBackup-${{ steps.version.outputs.VERSION }}.msi
          cp NimbusBackup.msi ../../release/NimbusBackup.msi
          zip ../../release/NimbusBackup-${{ steps.version.outputs.VERSION }}-windows.zip *
          cd ../..

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # Create release notes from RELEASE_NOTES.md + recent commits
          cat > RELEASE_BODY.md << 'EOFNOTES'
          # 🚀 Nimbus Backup ${{ steps.version.outputs.VERSION }}

          ## 📝 What's in this release

          EOFNOTES

          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "### Changes since ${PREV_TAG}" >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges >> RELEASE_BODY.md
            echo "" >> RELEASE_BODY.md
          fi

          # Add full status from RELEASE_NOTES.md
          echo "" >> RELEASE_BODY.md
          echo "---" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          cat RELEASE_NOTES.md >> RELEASE_BODY.md

          # Add tested with section
          echo "" >> RELEASE_BODY.md
          echo "---" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          echo "### Tested with NimbusBackup" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          echo "This release has been tested against [NimbusBackup managed PBS](https://nimbus.rdem-systems.com/blog/sauvegarder-windows-proxmox-backup-server/)." >> RELEASE_BODY.md

          # Add links at the end
          echo "" >> RELEASE_BODY.md
          echo "---" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          echo "**RDEM Systems**: https://www.rdem-systems.com/" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          echo "**Nimbus Backup - Fully managed Proxmox Backup Servers Datastore**: https://nimbus.rdem-systems.com/" >> RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_BODY.md
          files: release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release badge
        if: ${{ !contains(steps.version.outputs.VERSION, '-') }}
        run: |
          echo "Latest stable release: ${{ steps.version.outputs.VERSION }}"
