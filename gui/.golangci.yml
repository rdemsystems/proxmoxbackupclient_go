# golangci-lint configuration for Nimbus Backup GUI
run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    - format: line-number
      path: stdout
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  staticcheck:
    checks: ["all"]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
